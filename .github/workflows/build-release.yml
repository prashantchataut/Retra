name: Build and release Retra

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths-ignore:
      - "**/*.md"

permissions:
  contents: write

concurrency:
  group: retra-release-${{ github.ref }}
  cancel-in-progress: true

env:
  NDK_VERSION: "28.2.13676358"
  CMAKE_VERSION: "3.22.1"

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 9.5.0
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.0"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK components
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-37.0" \
            "build-tools;37.0.0" \
            "ndk;${NDK_VERSION}" \
            "cmake;${CMAKE_VERSION}"
          # sdkmanager installs API 37 as android-37.0; keep android-37 for older AGP lookups.
          if [ -d "${ANDROID_SDK_ROOT}/platforms/android-37.0" ] && [ ! -e "${ANDROID_SDK_ROOT}/platforms/android-37" ]; then
            ln -s "${ANDROID_SDK_ROOT}/platforms/android-37.0" "${ANDROID_SDK_ROOT}/platforms/android-37"
          fi

      - name: Export native toolchain paths
        run: |
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"
          echo "${ANDROID_SDK_ROOT}/cmake/${CMAKE_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Make project scripts executable
        run: chmod +x scripts/*.sh tools/*/run.sh

      - name: Fetch pinned mGBA source
        run: ./scripts/fetch-mgba-archive.sh

      - name: Build and stage mGBA libretro core
        shell: bash
        env:
          ABIS: "arm64-v8a armeabi-v7a x86_64"
        run: ./scripts/build-mgba-libretro-android.sh

      - name: Upload mGBA debug logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mgba-build-debug
          path: |
            third_party/mgba/android-build/**/configure.log
            third_party/mgba/android-build/**/build.log
            third_party/mgba/android-build/**/CMakeFiles/CMakeError.log
            third_party/mgba/android-build/**/CMakeFiles/CMakeOutput.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Verify gameplay core packaging
        shell: bash
        run: |
          set -euo pipefail
          for ABI in arm64-v8a armeabi-v7a x86_64; do
            CORE="emulation/native/src/main/jniLibs/${ABI}/libmgba_libretro.so"
            test -s "$CORE" || {
              echo "::error::Missing gameplay core for ${ABI}: ${CORE}"
              exit 1
            }
            file "$CORE"
          done
          test -s third_party/mgba/ANDROID_BINARY_HASHES.txt

      - name: Host verification suites (best-effort)
        continue-on-error: true
        run: |
          set +e
          if ! command -v kotlinc >/dev/null 2>&1 && command -v snap >/dev/null 2>&1; then
            sudo snap install kotlin --classic || true
          fi
          ./tools/native-verification/run.sh   || echo "::warning::native-verification did not pass"
          ./tools/libretro-verification/run.sh || echo "::warning::libretro-verification did not pass"
          if command -v kotlinc >/dev/null 2>&1; then
            ./tools/core-verification/run.sh   || echo "::warning::core-verification did not pass"
          else
            echo "::warning::kotlinc unavailable; skipping core-verification"
          fi
          SKIP_EXECUTION_SUITES=1 ./tools/project-verification/run.sh \
            || echo "::warning::project-verification did not pass"
          exit 0

      - name: Unit tests and release assembly
        run: |
          gradle --no-daemon --stacktrace :app:test :app:assembleRelease

      - name: Android lint (best-effort)
        continue-on-error: true
        run: |
          gradle --no-daemon --stacktrace :app:lint

      - name: Name APK and collect hashes
        id: package
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          APK_NAME="Retra-${SHORT_SHA}.apk"
          SOURCE_APK="$(find app/build/outputs/apk/release -name '*.apk' | head -n 1)"
          if [ -z "$SOURCE_APK" ]; then
            echo "::error::No APK produced by :app:assembleRelease."
            exit 1
          fi
          cp "$SOURCE_APK" "$APK_NAME"
          sha256sum "$APK_NAME" > "$APK_NAME.sha256"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"
          HASHES="third_party/mgba/ANDROID_BINARY_HASHES.txt"
          test -s "$HASHES"
          cp "$HASHES" ANDROID_BINARY_HASHES.txt

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Retra-${{ steps.package.outputs.short_sha }}
          path: |
            ${{ steps.package.outputs.apk_name }}
            ${{ steps.package.outputs.apk_name }}.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Upload mGBA binary hashes artifact
        uses: actions/upload-artifact@v4
        with:
          name: Retra-${{ steps.package.outputs.short_sha }}-mgba-hashes
          path: ANDROID_BINARY_HASHES.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          APK_NAME: ${{ steps.package.outputs.apk_name }}
          SHORT_SHA: ${{ steps.package.outputs.short_sha }}
        shell: bash
        run: |
          TAG="build-${SHORT_SHA}-${GITHUB_RUN_NUMBER}"
          ASSETS=("$APK_NAME" "$APK_NAME.sha256" "ANDROID_BINARY_HASHES.txt")
          {
            echo "Automated Retra 0.7.1 Android release for commit ${GITHUB_SHA}."
            echo
            echo "This APK is **debug-signed** with the public Android debug keystore for personal / open-source **sideload testing only**. It is **not** intended for Play Store distribution. Replace the signing config with a private upload key before any store submission. Uninstall any previously installed Retra build with a different signature before installing."
            echo
            echo "The pinned mGBA 0.10.5 libretro core was built from source and verified for arm64-v8a, armeabi-v7a, and x86_64. The workflow refuses to publish an APK when any gameplay ABI is missing."
            echo
            echo "Verify the download with the attached .sha256 before installing."
          } > release-notes.md
          gh release create "$TAG" "${ASSETS[@]}" \
            --target "$GITHUB_SHA" \
            --title "Retra 0.7.1 (${SHORT_SHA})" \
            --notes-file release-notes.md
