name: Build and release Retra

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths-ignore:
      - "**/*.md"

permissions:
  contents: write

concurrency:
  group: retra-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 9.5.0
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.0"

      - name: Build release APK
        run: |
          gradle --no-daemon --stacktrace :app:assembleRelease

      - name: Name APK after commit
        id: package
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          APK_NAME="Retra-${SHORT_SHA}.apk"
          SOURCE_APK="$(find app/build/outputs/apk/release -name '*.apk' | head -n 1)"
          if [ -z "$SOURCE_APK" ]; then
            echo "::error::No APK produced by :app:assembleRelease."
            exit 1
          fi
          cp "$SOURCE_APK" "$APK_NAME"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"
          sha256sum "$APK_NAME" > "$APK_NAME.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Retra-${{ steps.package.outputs.short_sha }}
          path: |
            ${{ steps.package.outputs.apk_name }}
            ${{ steps.package.outputs.apk_name }}.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          APK_NAME: ${{ steps.package.outputs.apk_name }}
          SHORT_SHA: ${{ steps.package.outputs.short_sha }}
        run: |
          TAG="build-${SHORT_SHA}-${GITHUB_RUN_NUMBER}"
          gh release create "$TAG" \
            "$APK_NAME" \
            "$APK_NAME.sha256" \
            --target "$GITHUB_SHA" \
            --title "Retra ${SHORT_SHA}" \
            --notes "Automated Android release for commit ${GITHUB_SHA}. Signed with the public Android debug keystore for personal/open-source sideload testing. Uninstall any previously unsigned Retra build before installing. Not for Play Store distribution."
