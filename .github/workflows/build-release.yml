name: Build Retra 2.2

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths-ignore:
      - "**/*.md"

permissions:
  contents: read

concurrency:
  group: retra-build-${{ github.ref }}
  cancel-in-progress: true

env:
  NDK_VERSION: "28.2.13676358"
  CMAKE_VERSION: "3.22.1"

jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 9.5.0
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.0"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK components
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-37.0" \
            "build-tools;37.0.0" \
            "ndk;${NDK_VERSION}" \
            "cmake;${CMAKE_VERSION}"
          if [ -d "${ANDROID_SDK_ROOT}/platforms/android-37.0" ] && [ ! -e "${ANDROID_SDK_ROOT}/platforms/android-37" ]; then
            ln -s "${ANDROID_SDK_ROOT}/platforms/android-37.0" "${ANDROID_SDK_ROOT}/platforms/android-37"
          fi

      - name: Export native toolchain paths
        shell: bash
        run: |
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"
          echo "${ANDROID_SDK_ROOT}/cmake/${CMAKE_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Make project scripts executable
        run: chmod +x scripts/*.sh tools/*/run.sh

      - name: Verify source structure and committed schemas
        shell: bash
        run: |
          set -euo pipefail
          SKIP_EXECUTION_SUITES=1 ./tools/project-verification/run.sh
          ./tools/schema-verification/run.sh

      - name: Run native host verification
        run: ./tools/native-verification/run.sh

      - name: Run libretro adapter verification
        run: ./tools/libretro-verification/run.sh

      - name: Run Kotlin core verification when compiler is available
        shell: bash
        run: |
          set -euo pipefail
          if command -v kotlinc >/dev/null 2>&1; then
            ./tools/core-verification/run.sh
          else
            echo "Kotlin CLI is not preinstalled; Gradle unit tests below remain mandatory."
          fi

      - name: Fetch pinned mGBA source
        run: ./scripts/fetch-mgba-archive.sh

      - name: Build and stage mGBA libretro core
        shell: bash
        env:
          ABIS: "arm64-v8a armeabi-v7a x86_64"
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: bash ./scripts/build-mgba-libretro-android.sh

      - name: Upload mGBA logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mgba-build-debug
          path: |
            third_party/mgba/android-build/**/configure.log
            third_party/mgba/android-build/**/build.log
            third_party/mgba/android-build/**/CMakeFiles/CMakeError.log
            third_party/mgba/android-build/**/CMakeFiles/CMakeOutput.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Verify gameplay-core packaging
        shell: bash
        run: |
          set -euo pipefail
          for ABI in arm64-v8a armeabi-v7a x86_64; do
            CORE="emulation/native/src/main/jniLibs/${ABI}/libmgba_libretro.so"
            test -s "$CORE" || {
              echo "::error::Missing gameplay core for ${ABI}: ${CORE}"
              exit 1
            }
            file "$CORE"
          done
          test -s third_party/mgba/ANDROID_BINARY_HASHES.txt

      - name: Run debug unit tests
        run: gradle --no-daemon --no-parallel --stacktrace :app:testDebugUnitTest

      - name: Compile migration instrumentation tests
        run: gradle --no-daemon --no-parallel --stacktrace :app:compileDebugAndroidTestKotlin

      - name: Assemble installable debug APK
        run: gradle --no-daemon --no-parallel --stacktrace :app:assembleDebug

      - name: Compile release variant
        run: gradle --no-daemon --no-parallel --stacktrace :app:assembleRelease

      - name: Validate generated Room schemas
        run: ./tools/schema-verification/run.sh

      - name: Android lint
        run: gradle --no-daemon --no-parallel --stacktrace :app:lintDebug

      - name: Name private-test APK and collect hashes
        id: package
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::8}"
          APK_NAME="Retra-2.2.0-debug-${SHORT_SHA}.apk"
          SOURCE_APK="$(find app/build/outputs/apk/debug -name '*-debug.apk' -print -quit)"
          test -n "$SOURCE_APK" || {
            echo "::error::No installable debug APK was produced."
            exit 1
          }
          cp "$SOURCE_APK" "$APK_NAME"
          sha256sum "$APK_NAME" > "$APK_NAME.sha256"
          cp third_party/mgba/ANDROID_BINARY_HASHES.txt ANDROID_BINARY_HASHES.txt
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload private-test APK
        uses: actions/upload-artifact@v4
        with:
          name: Retra-2.2.0-${{ steps.package.outputs.short_sha }}
          path: |
            ${{ steps.package.outputs.apk_name }}
            ${{ steps.package.outputs.apk_name }}.sha256
            ANDROID_BINARY_HASHES.txt
          if-no-files-found: error
          retention-days: 30
